services:
  - type: web
    name: terver-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER_EXTERNAL_URL
        value: https://terver-server.onrender.com
      - key: ACTIVE_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://terverai.vercel.app,http://localhost:3000
